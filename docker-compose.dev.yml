services:
  db:
    image: postgres:16-alpine
    container_name: portfolio_db_dev
    restart: unless-stopped
    env_file:
      - .env.development
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hot_pepper}"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - portfolio-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
      args:
        NODE_ENV: development
    container_name: portfolio_backend_dev
    restart: unless-stopped
    env_file:
      - path: .env.development
        required: false
    environment:
      POSTGRES_HOST: db
      DATABASE_URL: postgresql://${POSTGRES_USER:-hot_pepper}:${POSTGRES_PASSWORD:-hot_pepper}@db:5432/${POSTGRES_DB:-portfolio_db}
      PORT: "3000"
      DOCKER_CONTAINER: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx ts-node -r tsconfig-paths/register src/migrations/run.ts && npx nest start --watch"
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
      args:
        NODE_ENV: development
    container_name: portfolio_frontend_dev
    restart: unless-stopped
    environment:
      - DOCKER_DEV=true
      - NODE_ENV=development
      - VITE_API_URL=http://backend:3000/api
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173/ || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local

networks:
  portfolio-network:
    driver: bridge