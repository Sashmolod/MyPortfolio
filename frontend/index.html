    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>John Doe - Full Stack Developer | Portfolio</title>

    <meta property="og:type" content="website" />

    <meta property="twitter:description" content="Professional portfolio of John Doe, a Full Stack Developer specializing in React, Node.js, and modern web technologies." />
    <meta property="twitter:image" content="https://yourdomain.com/og-image.png" />
