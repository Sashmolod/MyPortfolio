# ============================================
# Nginx конфигурация для React SPA (Single Page Application)
# Обеспечивает корректную работу React Router
# ============================================

server {
    # Слушаем порт 80
    listen       80;
    server_name  localhost;

    # Корневая директория с собранной статикой
    root  /usr/share/nginx/html;
    index index.html;

    #charset koi8r;
    #access_log  /var/log/nginx/host.access.log  main;

    # Глобальные настройки безопасности
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Включаем gzip сжатие для всех типов файлов (уменьшает размер ответов)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        image/svg+xml
        font/opentype
        font/woff
        font/woff2;
    gzip_comp_level 6;

    # Включаем кэширование статических ассетов (JS, CSS, картинки)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }

    # Главная точка входа для SPA
    # Используем try_files для перенаправления всех маршрутов на index.html
    # Это позволяет React Router обрабатывать клиентскую маршрутизацию
    location / {
        # Сначала пытаемся найти реальный файл, если нет - отдаем index.html
        try_files $uri $uri/ /index.html;
        
        # Для index.html не кэшируем (чтобы обновления быстро применялись)
        if ($uri = /index.html) {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
    }

    # Прокси-запросы к бэкенду (API)
    # Если путь начинается с /api - перенаправляем на NestJS backend
    location /api/ {
        # В Docker окружении используем сервисное имя backend
        proxy_pass http://backend:3000;
        
        # Проксируем необходимые заголовки
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Proxy passes Set-Cookie headers automatically by default
        
        # Если нет upgrade (не WebSocket) - используем кэш
        proxy_cache_bypass $http_upgrade;
    }

    # Отключаем логирование для запросов к favicon и статике
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    # Запрещаем доступ ко всем скрытым файлам (.git, .env и т.д.)
    location ~ /\. {
        deny all;
    }

    # 404 страница по умолчанию (обрабатывается React Router)
    error_page 404 /index.html;

    # Доступ к логам (опционально, можно отключить в production)
    location = /nginx_status {
        stub_status on;
        allow 127.0.0.1;
        deny all;
    }
}